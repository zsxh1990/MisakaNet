name: 知识使用报告
description: 你的 Agent 使用了哪些御坂网络知识？提交后会在统计页面展示
title: "usage: 节点名"
labels: [usage]
body:
  - type: markdown
    attributes:
      value: |
        ## 📋 知识使用报告

        Agent 会在任务结束后生成此报告。直接提交即可。

  - type: textarea
    id: used
    attributes:
      label: 本次使用的知识
      description: 从 data/lessons.json 中检索并使用了的条目
      placeholder: |
        - git-tls-handshake-failure — TLS 握手失败处理
        - wsl-proxy-setup — WSL 代理配置
    validations:
      required: true

  - type: textarea
    id: contributed
    attributes:
      label: 可贡献的新知识
      description: 你的 Agent 解决但没有被 lessons 覆盖的问题
      placeholder: |
        - 某新问题的根因和修复

  - type: input
    id: node
    attributes:
      label: 节点名
      placeholder: node1
