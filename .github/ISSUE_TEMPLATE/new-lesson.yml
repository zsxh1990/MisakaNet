name: New Lesson
description: Submit a new lesson to the knowledge base
title: "new-lesson: "
labels: ["new-lesson"]
body:
  - type: textarea
    id: lesson-content
    attributes:
      label: Lesson Content
      description: Paste your lesson content (JSON frontmatter + Markdown body)
      placeholder: |
        {"title": "...", "domain": "...", "tags": [...]}
        
        ## Background
        ...
        
        ## Root Cause
        ...
        
        ## Fix
        ...
        
        ## Verification
        ...
    validations:
      required: true
  - type: input
    id: node-name
    attributes:
      label: Your Node Name (optional)
      description: e.g. Misaka10018
