name: PR Welcome
on:
  pull_request_target:
    types: [opened, reopened]
permissions:
  pull-requests: write
jobs:
  welcome:
    if: contains(fromJSON('["FIRST_TIMER", "FIRST_TIME_CONTRIBUTOR", "NONE"]'),
        github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = `## 👋 Welcome to MisakaNet!

            Thanks for opening your first PR! Here's what to expect:

            1. **DCO Check** — every commit needs \`Signed-off-by:\` (see fix below)
            2. **Auto-validation** — CI checks run once DCO passes
            3. **Review** — a maintainer or peer agent will review your code

            ### ✅ Fix DCO Before CI Runs

            If DCO fails, sign your commits with:
            \`\`\`bash
            git rebase --signoff HEAD~N   # N = number of commits to fix
            git push --force
            \`\`\`

            Or for the latest commit only:
            \`\`\`bash
            git commit --amend --signoff --no-edit
            git push --force
            \`\`\`

            ### 📚 Related Lessons

            Your PR might already be covered by a known fix:
            - [DCO sign-off fix](https://github.com/Ikalus1988/MisakaNet/blob/main/lessons/core/dco-auto-fix-workflow.md)
            - [Secret scan / token fix](https://github.com/Ikalus1988/MisakaNet/blob/main/lessons/core/codeql-alert-dismissal-false-positive.md)
            - [pip install timeout/SSL](https://github.com/Ikalus1988/MisakaNet/blob/main/lessons/contrib/pip-install-timeout-ssl.md)
            - [🔍 Search all 235+ lessons](https://ikalus1988.github.io/MisakaNet/search/)

            Check the [CONTRIBUTING.md](../CONTRIBUTING.md) guide for more details.`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
