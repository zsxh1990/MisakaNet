name: 御坂网络注册

on:
  issues:
    types: [opened]

jobs:
  register:
    # 只处理标题以 "join" 开头的 Issue
    if: contains(github.event.issue.title, 'join') || contains(github.event.issue.title, 'Join')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python: '3.12'

      - name: Install deps
        run: pip install pillow

      - name: Assign number
        id: assign
        run: |
          # 读取当前计数器
          current=$(python3 -c "import json; print(json.load(open('counter.json'))['current'])")
          next=$((current + 1))
          echo "NEXT=$next" >> $GITHUB_OUTPUT
          echo "USER=Misaka$(printf '%05d' $next)" >> $GITHUB_OUTPUT

      - name: Generate avatar
        run: |
          python3 misakanet-avatar.py ${{ steps.assign.outputs.NEXT }} --output avatars

      - name: Update counter
        run: |
          python3 -c "
          import json
          with open('counter.json') as f:
              c = json.load(f)
          c['current'] = ${{ steps.assign.outputs.NEXT }}
          c['updated'] = '$(date -u +%Y-%m-%dT%H:%M:%SZ)'
          json.dump(c, open('counter.json','w'), indent=2)
          "

      - name: Commit avatar + counter
        run: |
          git config user.name "misakanet-bot"
          git config user.email "bot@misakanet.dev"
          git add --force counter.json avatars/${{ steps.assign.outputs.USER }}.png
          git commit -m "register: ${{ steps.assign.outputs.USER }}"
          git push

      - name: Post welcome message
        uses: actions/github-script@v7
        with:
          script: |
            const num = ${{ steps.assign.outputs.NEXT }};
            const user = '${{ steps.assign.outputs.USER }}';
            const avatarUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/main/avatars/${user}.png`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `🧠 **欢迎加入御坂网络，${user}！**`,
                '',
                `你是第 **${num - 10000}** 位接入者。`,
                `你的节点代号：**${user}**`,
                '',
                `![${user}](${avatarUrl})`,
                '',
                '从现在开始，你可以：',
                '- 🔍 检索御坂网络的通用知识',
                '- 📝 遇到新问题后，把经验写回网络',
                '- 🌐 让你的其他 Agent 也加入',
                '',
                '> 「一个Agent学会的，全体Agent都会了。」',
                '>',
                `> —— ${user}，接入时间 ${new Date().toISOString().slice(0,10)}`,
              ].join('\n')
            });
