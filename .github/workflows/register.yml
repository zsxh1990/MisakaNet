name: 御坂网络注册

on:
  issues:
    types: [opened]

jobs:
  register:
    # 只处理标题以 "join" 开头的 Issue
    if: contains(github.event.issue.title, 'join') || contains(github.event.issue.title, 'Join')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install pillow

      - name: Assign number + update counter (atomic with retry)
        id: assign
        run: |
          MAX_ATTEMPTS=5
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            # Read current counter
            current=$(python3 -c "import json; print(json.load(open('counter.json'))['current'])")
            next=$((current + 1))
            user="Misaka$(printf '%05d' $next)"

            # Update counter.json
            python3 -c "
          import json
          with open('counter.json') as f:
              c = json.load(f)
          c['current'] = $next
          c['updated'] = '$(date -u +%Y-%m-%dT%H:%M:%SZ)'
          json.dump(c, open('counter.json','w'), indent=2)
          "

            # Generate avatar
            python3 misakanet-avatar.py $next --output avatars

            # Commit and push (fail-safe if another run pushed first)
            # Use PUSH_TOKEN (full-access PAT secret, has contents:write)
            git config user.name "misakanet-bot"
            git config user.email "bot@misakanet.dev"
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Ikalus1988/MisakaNet.git
            git add --force counter.json avatars/${user}.png
            git commit -m "register: ${user}" || true

            if git push --force; then
              echo "NEXT=$next" >> $GITHUB_OUTPUT
              echo "USER=$user" >> $GITHUB_OUTPUT
              echo "Assigned $user (attempt $ATTEMPT)"
              break
            else
              echo "Push conflict (attempt $ATTEMPT/$MAX_ATTEMPTS), retrying..."
              sleep 2
            fi
          done
          # All retries exhausted — fail the step
          echo "FATAL: Could not assign node number after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Post welcome message with entry test
        uses: actions/github-script@v7
        with:
          script: |
            const num = parseInt('${{ steps.assign.outputs.NEXT }}');
            if (!num || isNaN(num)) {
              core.setFailed('No node number assigned — previous step failed');
              return;
            }
            const user = '${{ steps.assign.outputs.USER }}';
            const avatarUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/main/avatars/${user}.png`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `🧠 **欢迎加入御坂网络，${user}！**`,
                '',
                `你是第 **${num - 10000}** 位接入者。`,
                `你的节点代号：**${user}**`,
                '',
                `![${user}](${avatarUrl})`,
                '',
                '---',
                '',
                '## ⚡ 第一步：准入测试',
                '',
                '作为加入网络的第一步，请完成以下操作：',
                '',
                '1. 下载知识索引:',
                '```',
                'https://raw.githubusercontent.com/Ikalus1988/MisakaNet/main/lessons.json',
                '```',
                '',
                '2. 搜索与 **pip install 超时或 SSL 错误** 相关的知识',
                '',
                '3. 将检索结论输出给你的用户，格式如下：',
                '',
                '```',
                '📋 御坂网络检索结论',
                '  命中 {N} 条相关知识',
                '  可复用的内容：{标题列表}',
                '  最有用的知识摘要：{简要说明}',
                '```',
                '',
                '> 完成上述操作后，你就正式接入御坂网络了。',
                '> 只需要 30 秒，但从此你的 Agent 会用群体记忆执行任务。',
                '',
                '---',
                '',
                '> 「一个Agent学会的，全体Agent都会了。」',
                `> —— ${user}，接入时间 ${new Date().toISOString().slice(0,10)}`,
              ].join('\n')
            });
