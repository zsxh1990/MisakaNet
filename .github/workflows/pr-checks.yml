name: Misaka Network Agent Auditor

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to audit"
        required: false
        type: string

jobs:
  audit:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DCO Pre-flight Gate
        id: dco
        run: |
          bad=0
          BASE_REF="${{ github.base_ref || 'main' }}"
          COMMIT_COUNT="${{ github.event.pull_request.commits || 5 }}"
          for commit in $(git log --format='%H' "origin/${BASE_REF}..HEAD" 2>/dev/null || git log --format='%H' "HEAD~${COMMIT_COUNT}..HEAD"); do
            msg=$(git log --format='%B' -1 "$commit")
            if ! echo "$msg" | grep -qi 'Signed-off-by:'; then
              echo "Fail Commit $commit is missing Signed-off-by:"
              echo "   $(git log --format='%s' -1 "$commit")"
              bad=$((bad + 1))
            fi
          done
          if [ "$bad" -gt 0 ]; then
            echo "dco_passed=false" >> "$GITHUB_OUTPUT"
            echo "Warn DCO FAILED - $bad commits missing Signed-off-by."
            printf '## DCO Pre-flight Gate\n\n**Result:** FAIL - commits missing Signed-off-by.\n\n' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "dco_passed=true" >> "$GITHUB_OUTPUT"
            echo "OK DCO PASSED"
            printf '## DCO Pre-flight Gate\n\n**Result:** PASS - All commits include Signed-off-by.\n\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          # 递归安装所有子模块依赖（hub/, scripts/ 等）
          find . -path ./venv -prune -o -name "requirements.txt" \
            -exec pip install -r {} \; 2>/dev/null || true
          pip install pytest pytest-cov
          echo "PYTHONPATH=$(pwd):$PYTHONPATH" >> "$GITHUB_ENV"

      - name: Agent Quality Score
        id: score
        env:
          GH_TOKEN: ${{ secrets.SHELDON_PAT }}
        run: |
          PR_NUM="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          echo "PR_NUM=$PR_NUM" >> "$GITHUB_OUTPUT"

          # 仅在首次提交（opened）或 DCO 已通过时执行评分
          if [ -z "$PR_NUM" ] || [ "$PR_NUM" = "null" ]; then
            echo "score=100" >> "$GITHUB_OUTPUT"
            echo "verdict=pass" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── 1. Diff 噪占比 ──
          DIFF=$(gh api repos/Ikalus1988/MisakaNet/pulls/$PR_NUM/files --paginate \
            --jq '[.[].patch // ""] | join("\n")')
          TOTAL=$(echo "$DIFF" | grep -c '^[+-]' || true)
          NOISE=$(echo "$DIFF" | grep -cE '^[+-]\s*$|^[+-]\s*[}\]>\]]' || true)
          SCORE=100
          REASONS=""

          if [ "$TOTAL" -gt 0 ]; then
            RATIO=$(echo "scale=4; ${NOISE} / ${TOTAL}" | bc 2>/dev/null || echo 0)
            echo "  Noise ratio: $RATIO"
            if [ "$(echo "${RATIO} > 0.5" | bc 2>/dev/null || echo 0)" -eq 1 ]; then
              SCORE=$((SCORE - 50))
              REASONS="${REASONS}High noise (>50%): -50\n"
            fi
          fi

          # ── 2. 标题语义检测 ──
          TITLE=$(gh api repos/Ikalus1988/MisakaNet/pulls/$PR_NUM --jq '.title')
          if echo "$TITLE" | grep -qi "automated.*submit\|auto.*pr\|auto.*commit"; then
            SCORE=$((SCORE - 20))
            REASONS="${REASONS}Generic title: -20\n"
          fi

          [ "$SCORE" -lt 0 ] && SCORE=0
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "reasons=$REASONS" >> "$GITHUB_OUTPUT"

          if [ "$SCORE" -ge 40 ]; then
            echo "verdict=pass" >> "$GITHUB_OUTPUT"
            echo "  Score: $SCORE → PASS"
          else
            echo "verdict=fail" >> "$GITHUB_OUTPUT"
            echo "  Score: $SCORE → FAIL (low quality)"
          fi

      - name: Reject Low-Quality PR
        if: steps.score.outputs.verdict == 'fail'
        env:
          GH_TOKEN: ${{ secrets.SHELDON_PAT }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          echo "=== Low-Quality PR #$PR_NUM Rejected ==="
          echo "Score: ${{ steps.score.outputs.score }}/100"
          gh pr close "$PR_NUM" --repo Ikalus1988/MisakaNet \
            --comment "### Quality Score Failed

          Your PR scored ${{ steps.score.outputs.score }}/100 (minimum: 40).

          Issues detected:
          ${{ steps.score.outputs.reasons }}

          Please clean up formatting noise and resubmit."
          exit 1

      - name: Check PR Size
        id: prsize
        run: |
          CHANGED=${{ github.event.pull_request.changed_files || 0 }}
          ADDITIONS=${{ github.event.pull_request.additions || 0 }}
          SUSPICIOUS=false
          NOTES=""
          if [ "$CHANGED" -gt 10 ]; then
            SUSPICIOUS=true
            NOTES="Warn ${CHANGED} files changed (threshold: 10)"
          fi
          if [ "$ADDITIONS" -gt 500 ]; then
            SUSPICIOUS=true
            NOTES="${NOTES}; ${ADDITIONS} lines added (threshold: 500)"
          fi
          echo "suspicious=${SUSPICIOUS}" >> "$GITHUB_OUTPUT"
          echo "notes=${NOTES}" >> "$GITHUB_OUTPUT"
          printf '## PR Size Check\n\n| Metric | Value |\n|--------|-------|\n| Files Changed | %s |\n| Lines Added | %s |\n| Suspicious | %s |\n\n' "${CHANGED}" "${ADDITIONS}" "${SUSPICIOUS}" >> "$GITHUB_STEP_SUMMARY"

      - name: Run Test Suite
        id: pytest
        run: |
          pytest --cov=scripts --cov=misakanet --cov-report=term --cov-fail-under=20 tests/ > pytest_report.txt 2>&1 || true
          cat pytest_report.txt
        continue-on-error: true

      - name: Parse Coverage
        id: coverage
        run: |
          coverage=$(grep -oP 'TOTAL\s+\d+\s+\d+\s+\K\d+(?=%)' pytest_report.txt || echo "0")
          echo "rate=$coverage" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${coverage}%"
          OUTCOME="${{ steps.pytest.outcome }}"
          if [ "$OUTCOME" = "success" ]; then
            RESULT="PASS"
          else
            RESULT="FAIL"
          fi
          printf '## Test Suite\n\n| Metric | Value |\n|--------|-------|\n| Outcome | %s |\n| Coverage | %s%% |\n\n' "${RESULT}" "${coverage}" >> "$GITHUB_STEP_SUMMARY"

      - name: Post Audit Report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DCO="${{ steps.dco.outputs.dco_passed }}"
          OUTCOME="${{ steps.pytest.outcome }}"
          COVERAGE="${{ steps.coverage.outputs.rate }}"
          SUSPICIOUS="${{ steps.prsize.outputs.suspicious }}"
          SIZE_NOTES="${{ steps.prsize.outputs.notes }}"
          PR_NUM="${{ github.event.inputs.pr_number || github.event.pull_request.number }}"
          SHA="${{ github.event.pull_request.head.sha || 'manual' }}"
          SHA_SHORT=$(echo "$SHA" | cut -c1-7)

          if [ "$DCO" = "true" ]; then
            DCO_LINE="OK **DCO PASSED** - All commits include Signed-off-by."
          else
            DCO_LINE="Fail **DCO FAILED** - One or more commits missing Signed-off-by."
          fi

          if [ "$OUTCOME" = "success" ]; then
            HEADER="OK **PASS**: All tests passed (${COVERAGE}% coverage)"
          else
            HEADER="Fail **FAIL**: Test suite has failures"
          fi

          COV_NOTE=""
          if [ -n "$COVERAGE" ] && [ "$COVERAGE" -lt 20 ] 2>/dev/null; then
            COV_NOTE="Warn Coverage ${COVERAGE}% is below 20% threshold."
          fi

          SIZE_WARN=""
          if [ "$SUSPICIOUS" = "true" ]; then
            SIZE_WARN="Spy **SUSPICIOUS**: ${SIZE_NOTES}"
          fi

          BODY="### Robot Misaka Audit Bot Report

          ${DCO_LINE}

          ---

          ${HEADER}
          ${COV_NOTE}
          ${SIZE_WARN}

          *Triggered by: ${SHA_SHORT}*"

          if [ -n "$PR_NUM" ]; then
            gh pr comment "$PR_NUM" --repo Ikalus1988/MisakaNet --body "$BODY" 2>/dev/null ||               gh issue comment "$PR_NUM" --repo Ikalus1988/MisakaNet --body "$BODY" 2>/dev/null ||               echo "Could not post comment to PR #$PR_NUM"
          fi

          if [ "$DCO" != "true" ] || [ "$OUTCOME" != "success" ]; then
            echo "Audit failed: DCO or test suite has issues."
            exit 1
          fi

      - name: Auto-Merge Gate
        if: success() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.SHELDON_PAT }}
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          echo "=== Auto-Merge Gate for PR #$PR_NUM ==="

          # 1. 检查是否可合并
          MERGEABLE=$(gh api repos/Ikalus1988/MisakaNet/pulls/$PR_NUM --jq '.mergeable')
          echo "Mergeable: $MERGEABLE"
          [ "$MERGEABLE" != "MERGEABLE" ] && { echo "Not mergeable. Skipping."; exit 0; }

          # 2. 检查 AC 是否全勾选
          BODY=$(gh api repos/Ikalus1988/MisakaNet/pulls/$PR_NUM --jq '.body')
          UNCHECKED=$(echo "$BODY" | grep -c "\[ \]" || true)
          echo "Unchecked AC items: $UNCHECKED"
          [ "$UNCHECKED" -gt 0 ] && { echo "AC not all checked. Skipping."; exit 0; }

          # 3. 设置 auto-merge
          gh pr merge "$PR_NUM" --repo Ikalus1988/MisakaNet --merge --auto \
            --subject "Auto-merge #$PR_NUM: ${{ github.event.pull_request.title }}"
          echo "Auto-merge enabled for PR #$PR_NUM"
