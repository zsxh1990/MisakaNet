name: Deploy Cloudflare Worker

on:
  push:
    paths:
      - "workers/register-proxy-sw.js"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail

          npx wrangler deploy workers/register-proxy-sw.js \
            --name misakanet-register-proxy \
            --compatibility-date 2024-01-01

      - name: Ensure keepalive schedule
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          curl -fsS -X PUT \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '[{"cron":"*/5 * * * *"}]' \
            "https://api.cloudflare.com/client/v4/accounts/6b92325b505f2b76aec49e9fe4195d31/workers/scripts/misakanet-register-proxy/schedules"
