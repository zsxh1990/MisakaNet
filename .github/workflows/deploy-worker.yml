name: Deploy Cloudflare Worker

on:
  push:
    paths:
      - "workers/register-proxy-sw.js"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker via Cloudflare API
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail

          # Modules format: multipart upload with metadata
          printf '{"main_module":"register-proxy-sw.js","compatibility_date":"2024-01-01"}' > /tmp/metadata.json

          curl --fail-with-body -sS -X PUT \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -F "metadata=@/tmp/metadata.json;type=application/json" \
            -F "register-proxy-sw.js=@workers/register-proxy-sw.js;type=application/javascript+module" \
            "https://api.cloudflare.com/client/v4/accounts/6b92325b505f2b76aec49e9fe4195d31/workers/scripts/misakanet-register-proxy"

          curl -fsS -X PUT \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '[{"cron":"*/5 * * * *"}]' \
            "https://api.cloudflare.com/client/v4/accounts/6b92325b505f2b76aec49e9fe4195d31/workers/scripts/misakanet-register-proxy/schedules"
