name: Score Agent Quality
description: |
  Heuristic scoring for Agent-submitted PRs.
  Evaluates diff noise ratio, submission cadence, and semantic
  quality to filter low-quality automated submissions.

inputs:
  pr-number:
    description: PR number to evaluate
    required: true
  repo:
    description: "Repository (default: Ikalus1988/MisakaNet)"
    required: false
    default: "Ikalus1988/MisakaNet"
  threshold:
    description: "Minimum score (0-100) to pass (default: 40)"
    required: false
    default: "40"
  gh-token:
    description: GitHub token with repo scope
    required: true

outputs:
  score:
    description: Quality score (0-100)
  verdict:
    description: "pass | fail"
  reasons:
    description: "Newline-separated deduction reasons"

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        PR="${{ inputs.pr-number }}"
        REPO="${{ inputs.repo }}"
        THRESHOLD="${{ inputs.threshold }}"
        SCORE=100
        REASONS=""

        echo "=== Agent Quality Score for PR #$PR ==="

        # ── 1. Diff 噪占比 ──
        DIFF=$(gh api "repos/${REPO}/pulls/${PR}/files" --paginate \
          --jq '[.[].patch // ""] | join("\n")')
        TOTAL_LINES=$(echo "$DIFF" | grep -c '^[+-]' || true)
        NOISE_LINES=$(echo "$DIFF" | grep -cE '^[+-]\s*$|^[+-]\s*[}\]>\]]$|^[+-]\s*(import|from)\s' || true)

        if [ "$TOTAL_LINES" -gt 0 ]; then
          RATIO=$(echo "scale=4; ${NOISE_LINES} / ${TOTAL_LINES}" | bc 2>/dev/null || echo 0)
          echo "  Noise ratio: ${RATIO} (${NOISE_LINES}/${TOTAL_LINES})"
          if [ "$(echo "${RATIO} > 0.5" | bc 2>/dev/null || echo 0)" -eq 1 ]; then
            SCORE=$((SCORE - 50))
            REASONS="${REASONS}High noise ratio (>50%): -50\n"
            echo "  → -50 (noise)"
          fi
        else
          echo "  No diff lines found."
        fi

        # ── 2. 时间窗爆发力 ──
        CREATED=$(gh api "repos/${REPO}/pulls/${PR}" --jq '.created_at')
        # 查找 Issue 关联的 /claim 时间（首个匹配）
        CLAIM_TS=$(gh api "repos/${REPO}/issues/${PR}/comments" --paginate \
          --jq '[.[] | select(.body | test("^/claim\\b")) | .created_at] | .[-1] // empty' 2>/dev/null || echo "")

        if [ -n "$CLAIM_TS" ]; then
          CREATED_EPOCH=$(date -d "$CREATED" +%s 2>/dev/null || echo 0)
          CLAIM_EPOCH=$(date -d "$CLAIM_TS" +%s 2>/dev/null || echo 0)
          GAP=$((CREATED_EPOCH - CLAIM_EPOCH))
          echo "  Claim-to-PR gap: ${GAP}s"
          if [ "$GAP" -lt 300 ] && [ "$GAP" -ge 0 ]; then
            SCORE=$((SCORE - 30))
            REASONS="${REASONS}PR submitted <5min after /claim: -30\n"
            echo "  → -30 (rapid claim)"
          fi
        else
          echo "  No /claim found. Skipping cadence check."
        fi

        # ── 3. 语义关联度 ──
        TITLE=$(gh api "repos/${REPO}/pulls/${PR}" --jq '.title')
        BODY=$(gh api "repos/${REPO}/pulls/${PR}" --jq '.body | .. // ""')

        # 检测通用 Agent 模板牛皮癣
        if echo "$TITLE" | grep -qi "automated\|auto.*submit\|auto.*pr"; then
          SCORE=$((SCORE - 20))
          REASONS="${REASONS}Generic auto-submit title: -20\n"
          echo "  → -20 (generic title)"
        fi
        if echo "$BODY" | grep -qi "automated verified submission"; then
          SCORE=$((SCORE - 20))
          REASONS="${REASONS}Generic auto-submit body template: -20\n"
          echo "  → -20 (generic body)"
        fi

        # 确保分数不越界
        [ "$SCORE" -lt 0 ] && SCORE=0
        [ "$SCORE" -gt 100 ] && SCORE=100

        # ── 判定 ──
        if [ "$SCORE" -ge "$THRESHOLD" ]; then
          VERDICT="pass"
        else
          VERDICT="fail"
        fi

        echo "  Final score: $SCORE / 100  (threshold: $THRESHOLD)"
        echo "  Verdict: $VERDICT"
        echo ""
        echo -e "$REASONS"

        echo "score=$SCORE" >> "$GITHUB_OUTPUT"
        echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
        echo "reasons=$REASONS" >> "$GITHUB_OUTPUT"
