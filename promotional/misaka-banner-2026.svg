<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320" width="960" height="320">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=JetBrains+Mono:wght@400;700&amp;family=Inter:wght@300;600');
      .title { font-family: 'Orbitron', monospace; font-size: 38px; font-weight: 900; fill: #f1f5f9; }
      .subtitle { font-family: 'Inter', sans-serif; font-size: 16px; fill: #00e5ff; font-weight: 600; letter-spacing: 3px; }
      .pillars { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #64748b; }
      .pillar-cyan { fill: #00e5ff; }
      .status-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #2a3a4a; }
      .status-value { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #22c55e; }
      .tagline { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #475569; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" fill="#070b15"/>
  <!-- Grid -->
  <g opacity="0.03">
    <line x1="0" y1="40" x2="960" y2="40" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="960" y2="80" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="960" y2="120" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="960" y2="160" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="960" y2="200" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="960" y2="240" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="0" y1="280" x2="960" y2="280" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="120" y1="0" x2="120" y2="320" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="320" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="320" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="320" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="320" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="320" stroke="#00e5ff" stroke-width="0.5"/>
    <line x1="840" y1="0" x2="840" y2="320" stroke="#00e5ff" stroke-width="0.5"/>
  </g>

  <!-- Pixel art (embedded from original) -->
  <image href="https://raw.githubusercontent.com/Ikalus1988/MisakaNet/main/promotional/misaka-pro.png" x="20" y="20" width="420" height="280" preserveAspectRatio="xMidYMid meet"/>

  <!-- Right panel: updated text -->
  <!-- Glow decoration -->
  <rect x="460" y="30" width="2" height="260" fill="#00e5ff" opacity="0.15" rx="1"/>

  <!-- Title -->
  <text x="480" y="75" class="title">MISAKA NETWORK</text>

  <!-- Subtitle -->
  <text x="480" y="105" class="subtitle">ASYNCHRONOUS MICRO-LESSON LIBRARY</text>

  <!-- Divider line -->
  <line x1="480" y1="120" x2="780" y2="120" stroke="#00e5ff" stroke-width="0.5" opacity="0.3"/>

  <!-- Pillars -->
  <text x="480" y="150" class="pillars"><tspan class="pillar-cyan">Safe</tspan> · <tspan class="pillar-cyan">Useful</tspan> · <tspan class="pillar-cyan">Zero-Dep</tspan></text>

  <!-- Status panel -->
  <rect x="480" y="170" width="260" height="60" rx="6" fill="rgba(0,229,255,0.03)" stroke="rgba(0,229,255,0.08)" stroke-width="1"/>

  <text x="492" y="193" class="status-label">status:</text>
  <text x="540" y="193" class="status-value">ready</text>

  <text x="492" y="212" class="status-label">runtime:</text>
  <text x="550" y="212" class="status-value">python stdlib only</text>

  <!-- Tagline -->
  <text x="480" y="270" class="tagline">swarm intelligence  ·  git-driven  ·  offline-first</text>

  <!-- Version badge -->
  <rect x="810" y="30" width="100" height="22" rx="4" fill="rgba(0,229,255,0.08)" stroke="rgba(0,229,255,0.12)" stroke-width="1"/>
  <text x="860" y="45" font-family="'JetBrains Mono',monospace" font-size="10" fill="#00e5ff" text-anchor="middle">v2.1 · 2026</text>
</svg>
